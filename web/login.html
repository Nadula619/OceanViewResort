<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OceanView Resort</title>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
            top: -50%;
            left: -50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="glass-card login-box fade-in">
            <div class="logo">OceanView Resort</div>
            <h2 style="margin-bottom: 10px; text-align: center; font-size: 22px;">Staff Portal</h2>
            <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 14px;">Please enter
                your credentials</p>
            <form id="loginForm">
                <div style="margin-bottom: 5px; font-size: 12px; color: var(--text-muted);">Email Address</div>
                <input type="email" name="email" placeholder="staff@oceanview.com" class="input-field" required>
                <div style="margin-bottom: 5px; font-size: 12px; color: var(--text-muted);">Password</div>
                <input type="password" name="password" placeholder="••••••••" class="input-field" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 14px;">Sign
                    In</button>
            </form>
            <div id="message"
                style="margin-top: 20px; text-align: center; color: var(--danger); font-size: 14px; font-weight: 500;">
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const params = new URLSearchParams();
            params.append('action', 'login');
            for (let pair of formData.entries()) params.append(pair[0], pair[1]);

            fetch('api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            })
                .then(res => {
                    if (!res.ok) throw new Error('Server returned ' + res.status);
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        console.log('Login successful. Role:', data.role);
                        const role = data.role ? data.role.toUpperCase() : '';
                        if (role === 'ADMIN') window.location.href = 'admin.html';
                        else if (role === 'RECEPTIONIST') window.location.href = 'receptionist.html';
                        else document.getElementById('message').innerText = 'Access denied: Your role (' + data.role + ') does not have dashboard access.';

                    } else {
                        document.getElementById('message').innerText = data.message || 'Login failed';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('message').innerText = 'Connection error. Please try again.';
                });
        };
    </script>
</body>

</html>
