<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard - OceanView</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">OceanView Front Desk</div>
            <nav>
                <a class="nav-item active" data-page="overview">Overview</a>
                <a class="nav-item" data-page="availability">Room Availability</a>
                <a class="nav-item" data-page="bookings">Check-ins</a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-primary" id="logoutBtn" style="width: 100%;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 id="pageTitle">Overview</h1>
                <div class="user-profile">
                    <span id="userName">Receptionist</span>
                </div>
            </header>

            <div id="overviewPage" class="page">
                <div class="stats-grid">
                    <div class="glass-card stat-card">
                        <div class="stat-label">Available Rooms</div>
                        <div class="stat-value" id="statAvailable">0</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Arrivals Today</div>
                        <div class="stat-value" id="statArrivals">0</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Departures Today</div>
                        <div class="stat-value" id="statDepartures">0</div>
                    </div>
                </div>
            </div>

            <div id="availabilityPage" class="page" style="display: none;">
                <h2>Live Room Status</h2>
                <div class="glass-card data-table-container">
                    <table id="roomsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Type</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Update Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="bookingsPage" class="page" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Check-in Operations</h2>
                    <button class="btn btn-primary" onclick="showAddBookingModal()">+ New Check-in</button>
                </div>
                <div class="glass-card data-table-container">
                    <table id="bookingsTable">
                        <thead>
                            <tr>
                                <th>Guest</th>
                                <th>Room</th>
                                <th>Dates</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="bookingModal" class="modal">
        <div class="glass-card modal-content">
            <h2 id="bookingModalTitle">New Check-in</h2>
            <form id="bookingForm" style="margin-top: 20px;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" name="firstName" placeholder="First Name" class="input-field" required
                        style="flex: 1;">
                    <input type="text" name="lastName" placeholder="Last Name" class="input-field" required
                        style="flex: 1;">
                </div>
                <input type="email" name="email" placeholder="Email Address" class="input-field" required>
                <input type="text" name="phone" placeholder="Phone Number" class="input-field" required>
                <textarea name="address" placeholder="Residential Address" class="input-field"
                    style="min-height: 60px;"></textarea>

                <select name="roomId" id="roomSelect" class="input-field" required>
                    <option value="">Select Room</option>
                </select>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: var(--text-muted);">Check-in Date</label>
                        <input type="date" name="checkInDate" class="input-field" required>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: var(--text-muted);">Check-out Date</label>
                        <input type="date" name="checkOutDate" class="input-field" required>
                    </div>
                </div>
                <input type="number" name="totalPrice" placeholder="Total Price (LKR)" class="input-field" required>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Create Booking</button>
                    <button type="button" class="btn" onclick="closeBookingModal()"
                        style="flex: 1; background: var(--glass);">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
    <script>
        initDashboard('RECEPTIONIST');
    </script>
</body>

</html>
