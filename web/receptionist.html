<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard - OceanView</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">OceanView Front Desk</div>
            <nav>
                <a class="nav-item active" data-page="overview">Overview</a>
                <a class="nav-item" data-page="availability">Room Availability</a>
                <a class="nav-item" data-page="bookings">Manage Bookings</a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-primary" id="logoutBtn" style="width: 100%;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 id="pageTitle">Overview</h1>
                <div class="user-profile">
                    <span id="userName">Receptionist</span>
                </div>
            </header>

            <div id="overviewPage" class="page">
                <div class="stats-grid">
                    <div class="glass-card stat-card">
                        <div class="stat-label">Available Rooms</div>
                        <div class="stat-value" id="statAvailable">0</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Arrivals Today</div>
                        <div class="stat-value" id="statArrivals">0</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Departures Today</div>
                        <div class="stat-value" id="statDepartures">0</div>
                    </div>
                </div>
            </div>

            <div id="availabilityPage" class="page" style="display: none;">
                <h2>Live Room Status</h2>
                <div class="glass-card data-table-container">
                    <table id="roomsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Type</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Update Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="bookingsPage" class="page" style="display: none;">
                <h2>Booking Operations</h2>
                <div class="glass-card data-table-container">
                    <table id="bookingsTable">
                        <thead>
                            <tr>
                                <th>Guest</th>
                                <th>Room</th>
                                <th>Dates</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
    <script>
        initDashboard('RECEPTIONIST');
    </script>
</body>

</html>
